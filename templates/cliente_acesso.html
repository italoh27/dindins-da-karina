<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Área do cliente · Geladinhos Gourmet</title>
  <link rel="stylesheet" href="/static/style.css?v=20260723-controles">
</head>
<body class="pagina-cliente pagina-premium-bg">
  <main class="cliente-shell">
    <a href="/" class="btn-voltar-premium">← Voltar para a loja</a>
    <header class="cliente-hero">
      <span class="eyebrow-premium">Sua experiência gourmet</span>
      <h1>Acompanhe seu pedido</h1>
      <p>Entre para conferir cada etapa, do recebimento até a entrega.</p>
    </header>
    {% if mensagem %}<div class="alerta alerta-sucesso">{{ mensagem }}</div>{% endif %}
    <section class="cliente-auth-grid">
      <form action="/cliente/entrar" method="post" class="glass-card cliente-form">
        <div><span class="eyebrow-premium">Já tenho cadastro</span><h2>Entrar</h2></div>
        <label><span>Telefone</span><input type="tel" name="telefone" placeholder="(81) 99999-9999" required autocomplete="tel"></label>
        <label><span>Senha</span><input type="password" name="senha" placeholder="Sua senha" required autocomplete="current-password"></label>
        <button class="btn-vibrante" type="submit">Acessar meus pedidos</button>
      </form>
      <form action="/cliente/cadastro" method="post" class="glass-card cliente-form">
        <div><span class="eyebrow-premium">Primeiro acesso</span><h2>Criar cadastro</h2></div>
        <label><span>Nome completo</span><input type="text" name="nome" required autocomplete="name"></label>
        <label><span>Telefone usado nos pedidos</span><input type="tel" name="telefone" required autocomplete="tel"></label>
        <label><span>E-mail <small>(opcional)</small></span><input type="email" name="email" autocomplete="email"></label>
        <label><span>Senha</span><input type="password" name="senha" minlength="6" required autocomplete="new-password"></label>
        <button class="btn-vibrante btn-vibrante-secundario" type="submit">Cadastrar e acompanhar</button>
      </form>
    </section>
  </main>
</body>
</html>
